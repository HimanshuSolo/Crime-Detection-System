version: '3.8'

services:
  # Django Backend
  backend:
    build:
      context: ./Website
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./Website:/app
      - django_media:/app/media
    environment:
      - DEBUG=False
      - SECRET_KEY=your-secret-key-here
    command: python manage.py runserver 0.0.0.0:8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  django_media:

networks:
  default:
    name: crime-detection-network
